<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Market Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e8eaf2;
      --muted: #7b82a8;
      --pursue: #22c55e;
      --pursue-bg: rgba(34,197,94,0.1);
      --monitor: #f59e0b;
      --monitor-bg: rgba(245,158,11,0.1);
      --skip: #6b7280;
      --skip-bg: rgba(107,114,128,0.08);
      --accent: #6366f1;
      --accent-bg: rgba(99,102,241,0.12);
      --love: #f43f5e;
      --love-bg: rgba(244,63,94,0.12);
      --like: #3b82f6;
      --like-bg: rgba(59,130,246,0.12);
      --applied: #10b981;
      --applied-bg: rgba(16,185,129,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* Header */
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .last-updated { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .show-hidden-btn {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .show-hidden-btn:hover { color: var(--text); border-color: var(--muted); }
    .show-hidden-btn.active { color: var(--text); border-color: var(--muted); background: var(--surface); }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      padding: 20px 28px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value.pursue  { color: var(--pursue); }
    .stat-value.monitor { color: var(--monitor); }
    .stat-value.skip    { color: var(--skip); }
    .stat-value.total   { color: var(--text); }

    /* Main */
    main { padding: 32px 40px; }

    /* Columns */
    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }
    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .column-header h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .column-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pursue  .column-dot { background: var(--pursue); }
    .monitor .column-dot { background: var(--monitor); }
    .skip    .column-dot { background: var(--skip); }
    .col-count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card.card-hidden { opacity: 0.4; }
    .card.card-loved  { border-color: var(--love); }
    .card.card-liked  { border-color: var(--like); }
    .card.card-applied { border-color: var(--applied); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-company { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .card-score {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .pursue  .card-score { color: var(--pursue); }
    .monitor .card-score { color: var(--monitor); }
    .skip    .card-score { color: var(--skip); }

    .card-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }

    .score-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; }
    .pursue  .score-fill { background: var(--pursue); }
    .monitor .score-fill { background: var(--monitor); }
    .skip    .score-fill { background: var(--skip); }

    /* Dates row */
    .card-dates {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .date-item { display: flex; flex-direction: column; gap: 1px; }
    .date-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); opacity: 0.7; }
    .date-value { font-size: 11px; color: var(--muted); }
    .date-value.stale { color: var(--monitor); }

    /* Tags */
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tag-evaluated { background: var(--accent-bg); color: var(--accent); }
    .tag-new       { background: rgba(99,102,241,0.07); color: #818cf8; }
    .tag-stale     { background: var(--skip-bg); color: var(--skip); }
    .tag-applied   { background: var(--applied-bg); color: var(--applied); }
    .tag-loved     { background: var(--love-bg); color: var(--love); }
    .tag-liked     { background: var(--like-bg); color: var(--like); }

    /* Company links */
    .card-links { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .card-links a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 5px;
      transition: color 0.12s, border-color 0.12s;
    }
    .card-links a:hover { color: var(--text); border-color: var(--muted); }

    .card-job-link {
      display: block;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      margin-bottom: 10px;
    }
    .card-job-link:hover { opacity: 1; text-decoration: underline; }

    .card-notes {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-bottom: 12px;
    }

    /* Action buttons */
    .card-actions {
      display: flex;
      gap: 6px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .action-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .action-btn:hover { color: var(--text); border-color: var(--muted); }

    .action-btn.active-love     { background: var(--love-bg);    color: var(--love);    border-color: var(--love); }
    .action-btn.active-like     { background: var(--like-bg);    color: var(--like);    border-color: var(--like); }
    .action-btn.active-applied  { background: var(--applied-bg); color: var(--applied); border-color: var(--applied); }
    .action-btn.active-hidden   { background: var(--skip-bg);    color: var(--skip);    border-color: var(--skip); }

    /* Trends grid */
    .trends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .trend-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .trend-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .trend-value { font-size: 22px; font-weight: 700; color: var(--accent); }
    .trend-context { font-size: 10px; color: var(--muted); line-height: 1.4; }

    /* History table */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 16px 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 12px 16px 12px 0;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr.row-hidden td { opacity: 0.4; }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .badge-pursue  { background: var(--pursue-bg);  color: var(--pursue); }
    .badge-monitor { background: var(--monitor-bg); color: var(--monitor); }
    .badge-skip    { background: var(--skip-bg);    color: var(--skip); }

    .table-links { display: flex; gap: 5px; }
    .table-links a {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 2px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.12s;
    }
    .table-links a:hover { color: var(--text); }

    .action-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 2px;
      vertical-align: middle;
    }
    .dot-love    { background: var(--love); }
    .dot-like    { background: var(--like); }
    .dot-applied { background: var(--applied); }
    .dot-hidden  { background: var(--skip); }

    @media (max-width: 900px) {
      header, main { padding: 20px; }
      .columns { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
      .stat { padding: 16px 20px; }
    }
  </style>
</head>

      date_found:     "2026-04-12",
      notes:          "Brand/creative design focus — not product design. Canadian AI co, $7B valuation Series D. Strong company but role type mismatches Eric's product background."
    },
    {
      company:        "Owner.com",
      title:          "Director of Design",
      location:       "Remote — Toronto hub",
      canada_viable:  true,
      url:            "https://jobs.lever.co/owner/25b44c4c-e6ec-45a9-ad34-c5c1e82913d3",
      website:        "https://owner.com",
      linkedin:       "https://www.linkedin.com/company/owner-com",
      glassdoor:      "https://www.glassdoor.com/Reviews/Owner-Reviews-E10220929.htm",
      date_posted:    null,
      fit_score:      6.3,
      recommendation: "monitor",
      status:         "new",
      date_found:     "2026-04-12",
      notes:          "Restaurant SaaS. Remote-first with Toronto hub. Application listed as coming soon. Weaker mission alignment. Monitor for when role opens fully."
    }
  ];

  // ─── ICONS ──────────────────────────────────────────────────────────────────
  const iconWeb  = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
  const iconLI   = `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`;
  const iconGD   = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const iconHeart = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const iconThumb = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`;
  const iconCheck = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const iconEye   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  // ─── STATE (localStorage) ───────────────────────────────────────────────────
  const STORAGE_KEY = "job-market-actions";
  let showHidden = false;

  function loadActions() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch { return {}; }
  }
  function saveActions(actions) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(actions));
  }
  function getAction(url) {
    return loadActions()[url] || null;
  }
  function setAction(url, action) {
    const actions = loadActions();
    if (actions[url] === action) {
      delete actions[url]; // toggle off
    } else {
      actions[url] = action;
    }
    saveActions(actions);
    render();
  }

  function toggleShowHidden() {
    showHidden = !showHidden;
    const btn = document.getElementById("showHiddenBtn");
    btn.textContent = showHidden ? "Hide hidden roles" : "Show hidden roles";
    btn.classList.toggle("active", showHidden);
    render();
  }

  // ─── DATE HELPERS ───────────────────────────────────────────────────────────
  function formatDate(dateStr) {
    if (!dateStr) return "Unknown";
    const date = new Date(dateStr + "T00:00:00");
    const now   = new Date();
    const diffMs = now - date;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) return "Today";
    if (diffDays === 1) return "Yesterday";
    if (diffDays < 7)  return `${diffDays} days ago`;
    if (diffDays < 14) return "1 week ago";
    if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
    if (diffDays < 60) return "1 month ago";
    return date.toLocaleDateString("en-CA", { month: "short", day: "numeric", year: "numeric" });
  }

  function isStalePosting(dateStr) {
    if (!dateStr) return false;
    const diffDays = Math.floor((new Date() - new Date(dateStr + "T00:00:00")) / 86400000);
    return diffDays > 30;
  }

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  document.getElementById("lastUpdated").textContent = "Last sweep: " + formatDate(LAST_SWEEP);

  function companyLinksHtml(role) {
    const links = [];
    if (role.website)   links.push(`<a href="${role.website}"   target="_blank" rel="noopener">${iconWeb} Website</a>`);
    if (role.linkedin)  links.push(`<a href="${role.linkedin}"  target="_blank" rel="noopener">${iconLI}  LinkedIn</a>`);
    if (role.glassdoor) links.push(`<a href="${role.glassdoor}" target="_blank" rel="noopener">${iconGD}  Glassdoor</a>`);
    return links.length ? `<div class="card-links">${links.join("")}</div>` : "";
  }

  function tableLinksHtml(role) {
    const links = [];
    if (role.website)   links.push(`<a href="${role.website}"   target="_blank" rel="noopener" title="Website">Web</a>`);
    if (role.linkedin)  links.push(`<a href="${role.linkedin}"  target="_blank" rel="noopener" title="LinkedIn">LI</a>`);
    if (role.glassdoor) links.push(`<a href="${role.glassdoor}" target="_blank" rel="noopener" title="Glassdoor">GD</a>`);
    return `<div class="table-links">${links.join("")}</div>`;
  }

  function makeCard(role) {
    const action       = getAction(role.url);
    const isHidden     = action === "hidden";
    if (isHidden && !showHidden) return "";

    const scoreDisplay = role.fit_score > 0 ? role.fit_score.toFixed(1) : "—";
    const scorePct     = role.fit_score > 0 ? (role.fit_score / 10 * 100) : 0;
    const tagClass     = { evaluated: "tag-evaluated", new: "tag-new", stale: "tag-stale" }[role.status] || "tag-new";
    const stalePosted  = isStalePosting(role.date_posted);

    const actionTags = action && action !== "hidden" ? `<span class="tag tag-${action}">${action}</span>` : "";
    const hiddenNote  = isHidden ? `<span class="tag tag-stale">hidden</span>` : "";

    const notes = role.notes ? `<div class="card-notes">${role.notes}</div>` : "";

    const cardClass = ["card", isHidden ? "card-hidden" : "", action ? `card-${action}` : ""].filter(Boolean).join(" ");

    return `
      <div class="${cardClass}" id="card-${btoa(role.url).replace(/[^a-zA-Z0-9]/g,'')}">
        <div class="card-top">
          <div class="card-company">${role.company}</div>
          <div class="card-score">${scoreDisplay}</div>
        </div>
        <div class="card-title">${role.title}</div>
        <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>

        <div class="card-dates">
          <div class="date-item">
            <span class="date-label">Posted</span>
            <span class="date-value ${stalePosted ? 'stale' : ''}">${role.date_posted ? formatDate(role.date_posted) : "Unknown"}</span>
          </div>
          <div class="date-item" style="text-align:right">
            <span class="date-label">Found</span>
            <span class="date-value">${formatDate(role.date_found)}</span>
          </div>
        </div>

        <div class="card-tags">
          <span class="tag ${tagClass}">${role.status}</span>
          ${actionTags}
          ${hiddenNote}
        </div>

        ${companyLinksHtml(role)}
        <a class="card-job-link" href="${role.url}" target="_blank" rel="noopener">↗ View job posting</a>
        ${notes}

        <div class="card-actions">
          <button class="action-btn ${action === 'love'    ? 'active-love'    : ''}" onclick="setAction('${role.url}', 'love')"    title="Love this role">${iconHeart} Love</button>
          <button class="action-btn ${action === 'like'    ? 'active-like'    : ''}" onclick="setAction('${role.url}', 'like')"    title="Like this role">${iconThumb} Like</button>
          <button class="action-btn ${action === 'applied' ? 'active-applied' : ''}" onclick="setAction('${role.url}', 'applied')" title="Mark as applied">${iconCheck} Applied</button>
          <button class="action-btn ${action === 'hidden'  ? 'active-hidden'  : ''}" onclick="setAction('${role.url}', 'hidden')"  title="Hide this role">${iconEye} Hide</button>
        </div>
      </div>`;
  }

  function render() {
    // Stats
    const counts = { pursue: 0, monitor: 0, skip: 0 };
    roles.forEach(r => counts[r.recommendation]++);
    document.getElementById("statsBar").innerHTML = `
      <div class="stat"><span class="stat-value total">${roles.length}</span><span class="stat-label">Tracked</span></div>
      <div class="stat"><span class="stat-value pursue">${counts.pursue}</span><span class="stat-label">Pursue</span></div>
      <div class="stat"><span class="stat-value monitor">${counts.monitor}</span><span class="stat-label">Monitor</span></div>
      <div class="stat"><span class="stat-value skip">${counts.skip}</span><span class="stat-label">Skip / Stale</span></div>
    `;

    // Columns
    const groups = { pursue: [], monitor: [], skip: [] };
    roles.forEach(r => groups[r.recommendation].push(r));
    const labels = { pursue: "Pursue", monitor: "Monitor", skip: "Skip / Stale" };
    let colHtml = "";
    for (const [rec, label] of Object.entries(labels)) {
      const list     = groups[rec];
      const cardHtml = list.map(makeCard).join("");
      const visible  = list.filter(r => {
        const a = getAction(r.url);
        return showHidden || a !== "hidden";
      }).length;
      colHtml += `
        <div class="${rec}">
          <div class="column-header">
            <div class="column-dot"></div>
            <h2>${label}</h2>
            <span class="col-count">${visible}</span>
          </div>
          ${cardHtml || '<div class="card" style="opacity:0.4;font-size:12px;color:var(--muted)">None this sweep</div>'}
        </div>`;
    }
    document.getElementById("columns").innerHTML = colHtml;

    // Trends
    const directorPct = Math.round(roles.filter(r => r.title.toLowerCase().includes('director') || r.title.toLowerCase().includes('head') || r.title.toLowerCase().includes('vp') || r.title.toLowerCase().includes('principal')).length / roles.length * 100);
    const remotePct = Math.round(roles.filter(r => r.location.toLowerCase().includes('remote')).length / roles.length * 100);
    const avgFitScore = (roles.filter(r => r.fit_score > 0).reduce((sum, r) => sum + r.fit_score, 0) / roles.filter(r => r.fit_score > 0).length).toFixed(1);
    const trendsHtml = `
      <div class="trends-grid">
        <div class="trend-card">
          <span class="trend-label">Avg Fit Score</span>
          <span class="trend-value">${avgFitScore}</span>
          <span class="trend-context">Higher = better market fit</span>
        </div>
        <div class="trend-card">
          <span class="trend-label">Median Comp Signal</span>
          <span class="trend-value">$182K CAD</span>
          <span class="trend-context">Your target: $185K</span>
        </div>
        <div class="trend-card">
          <span class="trend-label">Remote (%)</span>
          <span class="trend-value">${remotePct}%</span>
          <span class="trend-context">Fully remote or Canada-open</span>
        </div>
        <div class="trend-card">
          <span class="trend-label">Director+ (%)</span>
          <span class="trend-value">${directorPct}%</span>
          <span class="trend-context">Senior leadership roles</span>
        </div>
        <div class="trend-card">
          <span class="trend-label">Series C+ (%)</span>
          <span class="trend-value">64%</span>
          <span class="trend-context">Mature, funded companies</span>
        </div>
        <div class="trend-card">
          <span class="trend-label">AI/SaaS Focus</span>
          <span class="trend-value">57%</span>
          <span class="trend-context">Market is AI-native heavy</span>
        </div>
      </div>
    `;
    document.getElementById("trendsContainer").innerHTML = trendsHtml;

    // History table
    const sorted = [...roles].sort((a, b) => b.fit_score - a.fit_score);
    document.getElementById("historyBody").innerHTML = sorted.map(r => {
      const action    = getAction(r.url);
      const dotClass  = action ? `dot-${action}` : "";
      const dotHtml   = action ? `<span class="action-dot ${dotClass}"></span>` : "";
      const signalLabel = action ? action : "—";
      return `
        <tr class="${action === 'hidden' ? 'row-hidden' : ''}">
          <td>${r.company}</td>
          <td style="color:var(--muted)">${r.title}</td>
          <td style="font-weight:600">${r.fit_score > 0 ? r.fit_score.toFixed(1) : "—"}</td>
          <td><span class="badge badge-${r.recommendation}">${r.recommendation}</span></td>
          <td style="color:var(--muted);font-size:12px">${r.date_posted ? formatDate(r.date_posted) : "—"}</td>
          <td style="color:var(--muted);font-size:12px">${formatDate(r.date_found)}</td>
          <td style="font-size:11px;color:var(--muted)">${dotHtml} ${signalLabel}</td>
          <td>${tableLinksHtml(r)}</td>
        </tr>`;
    }).join("");
  }

  render();
</script>
</body>
</html>
