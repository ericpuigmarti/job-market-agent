<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Market Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e8eaf2;
      --muted: #7b82a8;
      --pursue: #22c55e;
      --pursue-bg: rgba(34,197,94,0.1);
      --monitor: #f59e0b;
      --monitor-bg: rgba(245,158,11,0.1);
      --skip: #6b7280;
      --skip-bg: rgba(107,114,128,0.08);
      --accent: #6366f1;
      --accent-bg: rgba(99,102,241,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* Header */
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .last-updated { font-size: 12px; color: var(--muted); text-align: right; white-space: nowrap; padding-top: 4px; }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      padding: 20px 28px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value.pursue { color: var(--pursue); }
    .stat-value.monitor { color: var(--monitor); }
    .stat-value.skip    { color: var(--skip); }
    .stat-value.total   { color: var(--text); }

    /* Main layout */
    main { padding: 32px 40px; }

    /* Columns */
    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .column-header h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .column-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pursue .column-dot  { background: var(--pursue); }
    .monitor .column-dot { background: var(--monitor); }
    .skip .column-dot    { background: var(--skip); }
    .col-count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s, transform 0.1s;
      cursor: default;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-company {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .card-score {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .pursue  .card-score { color: var(--pursue); }
    .monitor .card-score { color: var(--monitor); }
    .skip    .card-score { color: var(--skip); }

    .card-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .score-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .pursue  .score-fill { background: var(--pursue); }
    .monitor .score-fill { background: var(--monitor); }
    .skip    .score-fill { background: var(--skip); }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-date { font-size: 11px; color: var(--muted); }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tag-evaluated { background: var(--accent-bg); color: var(--accent); }
    .tag-new       { background: rgba(99,102,241,0.07); color: #818cf8; }
    .tag-stale     { background: var(--skip-bg); color: var(--skip); }

    .card-link {
      display: block;
      margin-top: 12px;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-link:hover { opacity: 1; text-decoration: underline; }

    .card-notes {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    /* Sweep history */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .history-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 16px 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 12px 16px 12px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .badge-pursue  { background: var(--pursue-bg);  color: var(--pursue); }
    .badge-monitor { background: var(--monitor-bg); color: var(--monitor); }
    .badge-skip    { background: var(--skip-bg);    color: var(--skip); }

    @media (max-width: 900px) {
      header, main { padding: 20px; }
      .columns { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
      .stat { padding: 16px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Job Market Pipeline</h1>
    <p>Eric Puigmarti — Design Leadership roles open to Canada</p>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</header>

<div class="stats" id="statsBar"></div>

<main>
  <div class="columns" id="columns"></div>

  <div class="section-title">All Tracked Roles</div>
  <table class="history-table" id="historyTable">
    <thead>
      <tr>
        <th>Company</th>
        <th>Title</th>
        <th>Score</th>
        <th>Recommendation</th>
        <th>Status</th>
        <th>Date Found</th>
      </tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>
</main>

<script>
  // ─── DATA ───────────────────────────────────────────────────────────────────
  // Auto-generated by job-market-agent on each sweep. Do not edit manually.
  const LAST_SWEEP = "2026-04-08";

  const roles = [
    {
      company:        "Clio",
      title:          "Director of Product Design, Work & Enterprise",
      location:       "Remote — Canada (ex-QC) and US",
      canada_viable:  true,
      url:            "https://clio.wd3.myworkdayjobs.com/ClioCareerSite/job/Remote---Canada/Director-of-Product-Design--Work---Enterprise_REQ-4625",
      fit_score:      8.8,
      recommendation: "pursue",
      status:         "new",
      date_found:     "2026-04-08",
      notes:          "Quick score 8.8 — flag for deep dive. $5B valuation, $400M ARR, Series G legal AI."
    },
    {
      company:        "Shakepay",
      title:          "Head of Design",
      location:       "Remote — Canada (offices in Montreal + Toronto)",
      canada_viable:  true,
      url:            "https://job-boards.greenhouse.io/shakepay/jobs/4604388005",
      fit_score:      8.4,
      recommendation: "pursue",
      status:         "new",
      date_found:     "2026-04-08",
      notes:          "Quick score 8.4 — flag for deep dive. ~$250K CAD signal. Top design role at consumer fintech."
    },
    {
      company:        "Wealthsimple",
      title:          "Director of Design, Portfolios",
      location:       "Remote — Canada",
      canada_viable:  true,
      url:            "https://jobs.lever.co/wealthsimple/6e890c37-f540-461b-933b-e8304079c33a",
      fit_score:      7.8,
      recommendation: "pursue",
      status:         "evaluated",
      date_found:     "2026-04-08",
      notes:          "Previously evaluated 2026-04-06. Full evaluation on file."
    },
    {
      company:        "Wealthsimple",
      title:          "Director, Product Design (Marketing / Growth)",
      location:       "Remote — Canada",
      canada_viable:  true,
      url:            "https://jobs.lever.co/wealthsimple/1e7986ba-c3da-4f19-82e3-3ca755a7a609",
      fit_score:      7.6,
      recommendation: "monitor",
      status:         "new",
      date_found:     "2026-04-08",
      notes:          "Verify freshness — may be mid-2025 posting. Narrower scope than Portfolios role."
    },
    {
      company:        "Elevate Labs",
      title:          "Director of Design",
      location:       "Remote — US & Canada",
      canada_viable:  true,
      url:            "https://jobs.lever.co/elevatelabs/ccb3d73a-28c2-4d9d-a177-003077bd8578",
      fit_score:      6.9,
      recommendation: "monitor",
      status:         "new",
      date_found:     "2026-04-08",
      notes:          "Brain training app. Reports to CEO. Last funding 2022 — unclear trajectory."
    },
    {
      company:        "Wattpad (WEBTOON Entertainment)",
      title:          "Director of Design",
      location:       "Remote — US or Canada (ex-QC)",
      canada_viable:  true,
      url:            "https://jobs.lever.co/wattpad/5e53294c-c7d5-435c-9e64-d4aa056b1f23",
      fit_score:      6.5,
      recommendation: "monitor",
      status:         "new",
      date_found:     "2026-04-08",
      notes:          "Naver subsidiary. Stable but limited growth signal. Had layoffs in 2023."
    },
    {
      company:        "Hipcamp",
      title:          "Director of Design",
      location:       "Remote — US/Canada",
      canada_viable:  true,
      url:            "https://jobs.lever.co/hipcamp/411bf95f-97d4-415b-ac93-c2b02b4617a7",
      fit_score:      0,
      recommendation: "skip",
      status:         "stale",
      date_found:     "2026-04-08",
      notes:          "Likely filled or removed. Skip unless reposted."
    }
  ];

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  document.getElementById("lastUpdated").textContent =
    "Last sweep: " + LAST_SWEEP + "\nericpuigmarti.github.io/job-market-agent";

  // Stats
  const counts = { pursue: 0, monitor: 0, skip: 0 };
  roles.forEach(r => counts[r.recommendation]++);
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><span class="stat-value total">${roles.length}</span><span class="stat-label">Tracked</span></div>
    <div class="stat"><span class="stat-value pursue">${counts.pursue}</span><span class="stat-label">Pursue</span></div>
    <div class="stat"><span class="stat-value monitor">${counts.monitor}</span><span class="stat-label">Monitor</span></div>
    <div class="stat"><span class="stat-value skip">${counts.skip}</span><span class="stat-label">Skip / Stale</span></div>
  `;

  // Columns
  function makeCard(role) {
    const scoreDisplay = role.fit_score > 0 ? role.fit_score.toFixed(1) : "—";
    const scorePct     = role.fit_score > 0 ? (role.fit_score / 10 * 100) : 0;
    const tagClass     = { evaluated: "tag-evaluated", new: "tag-new", stale: "tag-stale" }[role.status] || "tag-new";
    const notes        = role.notes
      ? `<div class="card-notes">${role.notes}</div>` : "";
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-company">${role.company}</div>
          <div class="card-score">${scoreDisplay}</div>
        </div>
        <div class="card-title">${role.title}</div>
        <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>
        <div class="card-meta">
          <span class="card-date">${role.date_found}</span>
          <div class="card-tags">
            <span class="tag ${tagClass}">${role.status}</span>
          </div>
        </div>
        <a class="card-link" href="${role.url}" target="_blank" rel="noopener">${role.url}</a>
        ${notes}
      </div>`;
  }

  const groups = { pursue: [], monitor: [], skip: [] };
  roles.forEach(r => groups[r.recommendation].push(r));

  const labels = { pursue: "Pursue", monitor: "Monitor", skip: "Skip / Stale" };
  let colHtml = "";
  for (const [rec, label] of Object.entries(labels)) {
    const list = groups[rec];
    colHtml += `
      <div class="${rec}">
        <div class="column-header">
          <div class="column-dot"></div>
          <h2>${label}</h2>
          <span class="col-count">${list.length}</span>
        </div>
        ${list.map(makeCard).join("") || '<div class="card" style="opacity:0.4;font-size:12px;color:var(--muted)">None this sweep</div>'}
      </div>`;
  }
  document.getElementById("columns").innerHTML = colHtml;

  // History table
  const sorted = [...roles].sort((a, b) => b.fit_score - a.fit_score);
  document.getElementById("historyBody").innerHTML = sorted.map(r => `
    <tr>
      <td>${r.company}</td>
      <td style="color:var(--muted)">${r.title}</td>
      <td style="font-weight:600">${r.fit_score > 0 ? r.fit_score.toFixed(1) : "—"}</td>
      <td><span class="badge badge-${r.recommendation}">${r.recommendation}</span></td>
      <td style="color:var(--muted);font-size:12px">${r.status}</td>
      <td style="color:var(--muted);font-size:12px">${r.date_found}</td>
    </tr>`).join("");
</script>
</body>
</html>
